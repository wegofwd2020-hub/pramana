openapi: 3.1.0
info:
  title: Pramana API
  version: 0.1.0
  summary: Compliance training and tracking platform
  description: |
    The Pramana v1 API. Single-tenant deployment for John Thomas Corporate,
    scoped to **SOX (Sarbanes-Oxley)** compliance training.

    Authentication is via OIDC SSO; the bearer token is a JWT issued by the
    customer's IdP. All endpoints require authentication unless noted as
    `[Public]`.

    The **content pipeline** — commission a Package Request → Mentible
    manufactures a Consumable Package → Pramana ingests, a human approves, and
    it publishes to an immutable course version — is defined by
    `docs/03_ai_drafted_human_approved_content.md` and Mentible **ADR-011**.

    See `docs/02_resolved_decisions.md` for the canonical specification this
    API implements.
  contact:
    name: WeGoFwd
  license:
    name: Proprietary
    identifier: LicenseRef-Proprietary

servers:
  - url: https://api.pramana.example.com/v1
    description: Production
  - url: https://staging-api.pramana.example.com/v1
    description: Staging
  - url: http://localhost:8000/v1
    description: Local development

tags:
  - name: Health
    description: Liveness and readiness probes
  - name: Users
    description: User identity and lifecycle
  - name: Courses
    description: Course definition and version management
  - name: Questions
    description: Quiz question authoring
  - name: Assignments
    description: Course assignment lifecycle
  - name: Attempts
    description: Quiz attempts and answer submission
  - name: Certificates
    description: Completion certificates and verification
  - name: Audit
    description: Audit log search (Auditor / Compliance Admin)
  - name: Exports
    description: Auditor evidence exports
  - name: Frameworks
    description: Definitions library — frameworks and clause anchors (the "law" picker)
  - name: ContentRequests
    description: Commission training content from a regulation (Package Request → Mentible)
  - name: ConsumerLibrary
    description: Inbound Consumable Package ingestion from Mentible (ADR-011)
  - name: ContentDrafts
    description: AI-drafted content review, approval, and publish (the human gate)
  - name: Player
    description: Course playback and watch-progress tracking

security:
  - BearerAuth: []

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /health:
    get:
      tags: [Health]
      summary: Liveness probe
      description: Returns 200 if the service process is alive. Does not check downstream dependencies.
      security: []
      responses:
        "200":
          description: Service is alive
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /health/ready:
    get:
      tags: [Health]
      summary: Readiness probe
      description: Returns 200 only when the service can serve traffic (DB and Redis reachable).
      security: []
      responses:
        "200":
          description: Service is ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Service is not ready
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Users
  # ---------------------------------------------------------------------------
  /users:
    get:
      tags: [Users]
      summary: List users
      description: Paginated list of users. Requires `ComplianceAdmin` or `Auditor` role.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/UserStatus"
        - name: user_type
          in: query
          schema:
            $ref: "#/components/schemas/UserType"
        - name: department
          in: query
          schema:
            type: string
        - name: search
          in: query
          description: Free-text search over email, first_name, last_name
          schema:
            type: string
      responses:
        "200":
          description: Page of users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

    post:
      tags: [Users]
      summary: Create a user
      description: Requires `ComplianceAdmin`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserCreate"
      responses:
        "201":
          description: User created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          $ref: "#/components/responses/Conflict"

  /users/me:
    get:
      tags: [Users]
      summary: Current authenticated user
      responses:
        "200":
          description: The current user's record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users/{user_id}:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Users]
      summary: Get a user
      responses:
        "200":
          description: User
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Users]
      summary: Update a user
      description: |
        Self-update is permitted for own profile fields. `ComplianceAdmin` may
        update any user. Pseudonymized users may not be updated.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UserUpdate"
      responses:
        "200":
          description: Updated user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /users/{user_id}/pseudonymize:
    parameters:
      - $ref: "#/components/parameters/UserId"
    post:
      tags: [Users]
      summary: Pseudonymize a user (GDPR-style erasure)
      description: |
        Replaces PII fields with hashed/null values while preserving training
        evidence rows for SOX retention. **Irreversible.** Requires
        `ComplianceAdmin` and an explicit `reason`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PseudonymizeRequest"
      responses:
        "200":
          description: User pseudonymized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: User already pseudonymized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /users/bulk-import:
    post:
      tags: [Users]
      summary: Bulk-import users from CSV
      description: |
        Multipart upload of a CSV with columns: `email`, `first_name`,
        `last_name`, `user_type`, `department`, `manager_email`. Requires
        `ComplianceAdmin`.
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                  description: CSV file
                dry_run:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportSummary"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ---------------------------------------------------------------------------
  # Courses
  # ---------------------------------------------------------------------------
  /courses:
    get:
      tags: [Courses]
      summary: List courses
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: archived
          in: query
          schema:
            type: boolean
            default: false
        - name: framework_tag
          in: query
          schema:
            type: string
            example: sox
      responses:
        "200":
          description: Page of courses
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoursePage"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      tags: [Courses]
      summary: Create a course
      description: Requires `ContentAuthor` or `ComplianceAdmin`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseCreate"
      responses:
        "201":
          description: Course created (no published version yet)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /courses/{course_id}:
    parameters:
      - $ref: "#/components/parameters/CourseId"
    get:
      tags: [Courses]
      summary: Get a course
      responses:
        "200":
          description: Course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    patch:
      tags: [Courses]
      summary: Update course metadata
      description: |
        Updates apply to course-level metadata only (title, description,
        cooldown_days, pass_threshold_pct, framework_tags). Question content is
        immutable; create a new course version to change it.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseUpdate"
      responses:
        "200":
          description: Updated course
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Course"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Courses]
      summary: Archive a course
      description: |
        Archives the course (soft delete). Existing assignments continue, but
        new assignments are blocked. Hard deletion is never supported.
      responses:
        "204":
          description: Archived
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{course_id}/versions:
    parameters:
      - $ref: "#/components/parameters/CourseId"
    get:
      tags: [Courses]
      summary: List versions of a course
      responses:
        "200":
          description: Versions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/CourseVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Courses]
      summary: Publish a new course version
      description: |
        Snapshots the current draft questions into a new version, makes it the
        active version, and atomically deactivates the previous version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CourseVersionCreate"
      responses:
        "201":
          description: New version published
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseVersion"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /courses/{course_id}/versions/{version_id}:
    parameters:
      - $ref: "#/components/parameters/CourseId"
      - $ref: "#/components/parameters/VersionId"
    get:
      tags: [Courses]
      summary: Get a specific course version
      responses:
        "200":
          description: Version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Questions (always under a course version)
  # ---------------------------------------------------------------------------
  /courses/{course_id}/versions/{version_id}/questions:
    parameters:
      - $ref: "#/components/parameters/CourseId"
      - $ref: "#/components/parameters/VersionId"
    get:
      tags: [Questions]
      summary: List questions for a course version
      responses:
        "200":
          description: Questions
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Question"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
    post:
      tags: [Questions]
      summary: Add a question to a draft version
      description: Only permitted on versions that have not yet been published.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionCreate"
      responses:
        "201":
          description: Question added
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /questions/{question_id}:
    parameters:
      - $ref: "#/components/parameters/QuestionId"
    patch:
      tags: [Questions]
      summary: Update a draft question
      description: Only permitted while the parent course version is unpublished.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/QuestionUpdate"
      responses:
        "200":
          description: Updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Question"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
    delete:
      tags: [Questions]
      summary: Delete a draft question
      responses:
        "204":
          description: Deleted
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Assignments
  # ---------------------------------------------------------------------------
  /assignments:
    get:
      tags: [Assignments]
      summary: List assignments (admin / manager view)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: course_id
          in: query
          schema:
            type: string
            format: uuid
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AssignmentStatus"
        - name: overdue_only
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Page of assignments
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AssignmentPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [Assignments]
      summary: Create an assignment
      description: |
        Validates: (1) the user is not within the course's cooldown window,
        (2) the user is not the course's content author (separation of duties),
        (3) the course has an active published version.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AssignmentCreate"
      responses:
        "201":
          description: Assignment created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "409":
          description: Cooldown active or separation-of-duties violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /assignments/bulk:
    post:
      tags: [Assignments]
      summary: Create assignments in bulk from CSV
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required: [file]
              properties:
                file:
                  type: string
                  format: binary
                course_id:
                  type: string
                  format: uuid
                  description: Optional override; if absent, CSV must contain `course_id`.
                due_at:
                  type: string
                  format: date-time
                dry_run:
                  type: boolean
                  default: false
      responses:
        "200":
          description: Import summary
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/BulkImportSummary"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /assignments/me:
    get:
      tags: [Assignments]
      summary: Current user's assignments
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/AssignmentStatus"
      responses:
        "200":
          description: Current user's assignments
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Assignment"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /assignments/{assignment_id}:
    parameters:
      - $ref: "#/components/parameters/AssignmentId"
    get:
      tags: [Assignments]
      summary: Get an assignment
      responses:
        "200":
          description: Assignment
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /assignments/{assignment_id}/cancel:
    parameters:
      - $ref: "#/components/parameters/AssignmentId"
    post:
      tags: [Assignments]
      summary: Cancel an assignment
      description: |
        Permitted only from `ASSIGNED` or `IN_PROGRESS`. Requires
        `ComplianceAdmin`. Audit log entry includes the supplied reason.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CancelRequest"
      responses:
        "200":
          description: Assignment cancelled
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Assignment"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Invalid state transition (assignment is terminal)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Attempts
  # ---------------------------------------------------------------------------
  /assignments/{assignment_id}/attempts:
    parameters:
      - $ref: "#/components/parameters/AssignmentId"
    post:
      tags: [Attempts]
      summary: Start a new attempt
      description: |
        Transitions the assignment `ASSIGNED → IN_PROGRESS`. Validates FR7
        (no other in-progress assignment) and `attempts_used < max_attempts`.
        Idempotent: if an `IN_PROGRESS` attempt already exists, returns it.
      responses:
        "201":
          description: Attempt started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attempt"
        "200":
          description: Existing in-progress attempt returned (idempotent)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Attempt"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Concurrent assignment / max attempts / cooldown violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attempts/{attempt_id}:
    parameters:
      - $ref: "#/components/parameters/AttemptId"
    get:
      tags: [Attempts]
      summary: Get an attempt with its questions
      description: |
        For the trainee, returns questions with their selected answers (if
        any) but never the canonical correct answer until after submission.
        For auditors and admins, full detail is returned.
      responses:
        "200":
          description: Attempt
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /attempts/{attempt_id}/answers:
    parameters:
      - $ref: "#/components/parameters/AttemptId"
    put:
      tags: [Attempts]
      summary: Save an answer (autosave-friendly)
      description: |
        Idempotent per `(attempt_id, question_id)`. Submitting the same answer
        twice has no additional effect. Permitted only while the attempt is
        `IN_PROGRESS`.
      parameters:
        - name: Idempotency-Key
          in: header
          required: false
          description: Optional key to deduplicate retries
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AnswerUpsert"
      responses:
        "204":
          description: Answer saved
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Attempt is no longer in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /attempts/{attempt_id}/submit:
    parameters:
      - $ref: "#/components/parameters/AttemptId"
    post:
      tags: [Attempts]
      summary: Submit and score the attempt
      description: |
        Finalises the attempt, computes the score, and transitions the parent
        assignment to `PASSED`, `FAILED` (with retry allowed), or `BLOCKED`
        per Section 4 of the resolved decisions doc. On `PASSED`, a certificate
        is issued. **Idempotent.**
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/AttemptSubmit"
      responses:
        "200":
          description: Submission result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AttemptSubmissionResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Attempt is not in progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Certificates
  # ---------------------------------------------------------------------------
  /certificates:
    get:
      tags: [Certificates]
      summary: List certificates
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: course_id
          in: query
          schema:
            type: string
            format: uuid
        - name: include_expired
          in: query
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Page of certificates
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificatePage"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /certificates/{certificate_id}:
    parameters:
      - $ref: "#/components/parameters/CertificateId"
    get:
      tags: [Certificates]
      summary: Get a certificate
      responses:
        "200":
          description: Certificate
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Certificate"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /certificates/{certificate_id}/pdf:
    parameters:
      - $ref: "#/components/parameters/CertificateId"
    get:
      tags: [Certificates]
      summary: Download certificate PDF
      responses:
        "200":
          description: PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /certificates/verify/{verification_code}:
    get:
      tags: [Certificates]
      summary: Verify a certificate by its code
      description: |
        `[Public]` — no authentication. Returns minimal verification info
        (validity, issued_at, course title, user display name). Used for
        third-party verification (e.g. job applications).
      security: []
      parameters:
        - name: verification_code
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Verification result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CertificateVerification"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Audit log
  # ---------------------------------------------------------------------------
  /audit:
    get:
      tags: [Audit]
      summary: Search the audit log
      description: Requires `Auditor` or `ComplianceAdmin`.
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: actor_user_id
          in: query
          schema:
            type: string
            format: uuid
        - name: entity_type
          in: query
          schema:
            type: string
        - name: entity_id
          in: query
          schema:
            type: string
        - name: event_type
          in: query
          schema:
            type: string
        - name: occurred_after
          in: query
          schema:
            type: string
            format: date-time
        - name: occurred_before
          in: query
          schema:
            type: string
            format: date-time
      responses:
        "200":
          description: Page of audit log entries
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditLogPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  # ---------------------------------------------------------------------------
  # Auditor exports
  # ---------------------------------------------------------------------------
  /exports/population:
    get:
      tags: [Exports]
      summary: Export the SOX-in-scope population
      description: CSV download. Requires `Auditor` or `ComplianceAdmin`.
      parameters:
        - name: as_of
          in: query
          schema:
            type: string
            format: date
            description: Point-in-time snapshot date (defaults to today)
      responses:
        "200":
          description: CSV
          content:
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /exports/training-matrix:
    get:
      tags: [Exports]
      summary: Export the training matrix
      description: |
        CSV — rows are users, columns are courses, cells are completion status
        (`PASSED` with date, `BLOCKED`, `IN_PROGRESS`, etc.) for the period.
      parameters:
        - name: period_start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: period_end
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: framework_tag
          in: query
          schema:
            type: string
            example: sox
      responses:
        "200":
          description: CSV
          content:
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /exports/exception-report:
    get:
      tags: [Exports]
      summary: Export overdue / blocked / expired assignments
      parameters:
        - name: as_of
          in: query
          schema:
            type: string
            format: date
      responses:
        "200":
          description: CSV
          content:
            text/csv:
              schema:
                type: string
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /exports/users/{user_id}/audit-binder:
    parameters:
      - $ref: "#/components/parameters/UserId"
    get:
      tags: [Exports]
      summary: Per-user audit binder (PDF)
      description: |
        Bundles the user's assignments, attempts, certificates, and audit-log
        entries into a single PDF for the period. Used for SOX sample testing.
      parameters:
        - name: period_start
          in: query
          required: true
          schema:
            type: string
            format: date
        - name: period_end
          in: query
          required: true
          schema:
            type: string
            format: date
      responses:
        "200":
          description: PDF
          content:
            application/pdf:
              schema:
                type: string
                format: binary
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Frameworks (the "law" picker — definitions library feed for commissioning)
  # ---------------------------------------------------------------------------
  /frameworks:
    get:
      tags: [Frameworks]
      summary: List frameworks in the definitions library
      description: |
        Feeds the commissioning UI's framework picker (US-PLATFORM-0003). Source
        of truth is `docs/frameworks/*` — Pramana owns the definitions (ADR-011 §1).
      responses:
        "200":
          description: Frameworks
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Framework"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /frameworks/{framework}/clauses:
    parameters:
      - $ref: "#/components/parameters/FrameworkSlug"
    get:
      tags: [Frameworks]
      summary: List a framework's clause anchors
      description: |
        The selectable clauses (e.g. `#anti-bribery`) that become a Package
        Request's `source_definitions`. A request referencing a clause that does
        not appear here cannot be submitted.
      responses:
        "200":
          description: Clauses
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FrameworkClause"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Content Requests (Create phase — commission content, Package Request → Mentible)
  # ---------------------------------------------------------------------------
  /content-requests:
    get:
      tags: [ContentRequests]
      summary: List content (package) requests
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: framework
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ContentRequestStatus"
      responses:
        "200":
          description: Page of content requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentRequestPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
    post:
      tags: [ContentRequests]
      summary: Commission content — create a Package Request and push to Mentible
      description: |
        Builds a Package Request (the spec side of the ADR-011 manifest) and pushes
        it to Mentible. Requires `ContentAuthor` / `ComplianceAdmin`. Every
        `source_definitions[].ref` must resolve to a real clause anchor in the
        definitions library, else 422. `requested_by` is taken from the caller for
        audit. See US-PLATFORM-0003.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ContentRequestCreate"
      responses:
        "202":
          description: Request accepted and pushed to Mentible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentRequest"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          description: A referenced clause does not resolve in the definitions library
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content-requests/{request_id}:
    parameters:
      - $ref: "#/components/parameters/ContentRequestId"
    get:
      tags: [ContentRequests]
      summary: Get a content request (and its status)
      responses:
        "200":
          description: Content request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Consumer Library (inbound from Mentible — the ADR-011 ingestion endpoint)
  # ---------------------------------------------------------------------------
  /consumer-library/packages:
    post:
      tags: [ConsumerLibrary]
      summary: Ingest a pushed Consumable Package (Mentible → Pramana)
      description: |
        One-way push (ADR-011 §6). Machine-to-machine: the caller is Mentible
        (service credential). Pramana verifies the manifest **signature** and
        **content_hash**; on success it records an untrusted `RECEIVED`
        `ContentDraft` (idempotent on `(tenant_id, package_id, package_version)`).
        A verification failure quarantines the package (422) — it is never silently
        published. Implemented by `pramana/services/consumer_library.py`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IngestPackageRequest"
      responses:
        "201":
          description: Package accepted as a RECEIVED draft
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IngestPackageResult"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          description: Target course/tenant not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: This (package_id, package_version) was already ingested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "422":
          description: Malformed manifest, or signature/content_hash failed (quarantined)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ---------------------------------------------------------------------------
  # Content Drafts (Approve phase — the human review/approval gate)
  # ---------------------------------------------------------------------------
  /content-drafts:
    get:
      tags: [ContentDrafts]
      summary: List content drafts (the review queue)
      parameters:
        - $ref: "#/components/parameters/Page"
        - $ref: "#/components/parameters/PageSize"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ContentDraftStatus"
        - name: framework
          in: query
          schema:
            type: string
        - name: quarantined
          in: query
          description: When true, return only packages that failed verification.
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Page of drafts
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentDraftPage"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /content-drafts/{draft_id}:
    parameters:
      - $ref: "#/components/parameters/DraftId"
    get:
      tags: [ContentDrafts]
      summary: Get a draft for review (preview payload)
      description: |
        Returns the full review payload: modules + quiz + per-claim citations,
        provenance, the signature/content_hash verification result, and artifact
        references. Used by the review screen (US-PLATFORM-0004).
      responses:
        "200":
          description: Draft detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentDraftDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /content-drafts/{draft_id}/submit-for-review:
    parameters:
      - $ref: "#/components/parameters/DraftId"
    post:
      tags: [ContentDrafts]
      summary: Open a draft for review
      description: Transition `RECEIVED`/`DRAFT` → `IN_REVIEW`.
      responses:
        "200":
          description: Draft in review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentDraft"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Not in a pre-review state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content-drafts/{draft_id}/approve:
    parameters:
      - $ref: "#/components/parameters/DraftId"
    post:
      tags: [ContentDrafts]
      summary: Approve a draft (attestation + separation of duties)
      description: |
        Transition `IN_REVIEW` → `APPROVED`. The approver **must not** be the
        draft's requester/generator (separation of duties → 409). Captures an
        attestation and freezes the content hash. See US-FCPA-0005 / US-PLATFORM-0004.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveRequest"
      responses:
        "200":
          description: Draft approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentDraft"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Not in review, or separation-of-duties violation
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content-drafts/{draft_id}/request-changes:
    parameters:
      - $ref: "#/components/parameters/DraftId"
    post:
      tags: [ContentDrafts]
      summary: Request changes on a draft
      description: Transition `IN_REVIEW` → `DRAFT`/`RECEIVED` with reviewer notes.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewNotes"
      responses:
        "200":
          description: Changes requested
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentDraft"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Not in review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content-drafts/{draft_id}/reject:
    parameters:
      - $ref: "#/components/parameters/DraftId"
    post:
      tags: [ContentDrafts]
      summary: Reject a draft (terminal)
      description: Transition `IN_REVIEW` → `REJECTED`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReviewNotes"
      responses:
        "200":
          description: Draft rejected
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentDraft"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Not in review
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content-drafts/{draft_id}/publish:
    parameters:
      - $ref: "#/components/parameters/DraftId"
    post:
      tags: [ContentDrafts]
      summary: Publish an approved draft to an immutable course version
      description: |
        Transition `APPROVED` → `PUBLISHED`, materializing a `CourseVersion` that
        becomes assignable. Returns the created version.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PublishRequest"
      responses:
        "201":
          description: Published course version
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CourseVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          description: Not in APPROVED state
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /content-drafts/{draft_id}/regenerate:
    parameters:
      - $ref: "#/components/parameters/DraftId"
    post:
      tags: [ContentDrafts]
      summary: Regenerate a draft with updated parameters
      description: |
        Re-issues the original Package Request (optionally with parameter overrides)
        to Mentible; the returned package arrives as a **new `package_version`** that
        supersedes this draft. Does not rewrite published versions or completion
        records. Lineage handling tracks ADR-011 §10. See US-PLATFORM-0005.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegenerateRequest"
      responses:
        "202":
          description: Regeneration request pushed to Mentible
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ContentRequest"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ---------------------------------------------------------------------------
  # Player (Present phase — playback + watch-progress)
  # ---------------------------------------------------------------------------
  /assignments/{assignment_id}/player:
    parameters:
      - $ref: "#/components/parameters/AssignmentId"
    get:
      tags: [Player]
      summary: Player manifest for an assigned course
      description: |
        Returns what the player needs for the assignment's pinned `CourseVersion`:
        time-limited asset URLs (video/deck/animated visuals), the `min_watch_pct`
        gate, current watch progress, and whether the quiz is unlocked. Only the
        assignee (or an authorized manager) may fetch it. See US-PLATFORM-0002.
      responses:
        "200":
          description: Player manifest
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PlayerManifest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /assignments/{assignment_id}/progress:
    parameters:
      - $ref: "#/components/parameters/AssignmentId"
    post:
      tags: [Player]
      summary: Record watch progress
      description: |
        Idempotent upsert of the learner's furthest watched position. When the
        watched percentage reaches `min_watch_pct`, the response reports the quiz
        as unlocked.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ProgressUpdate"
      responses:
        "200":
          description: Updated progress
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WatchProgress"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

# ===========================================================================
# Components
# ===========================================================================
components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: |
        OIDC-issued JWT in the `Authorization: Bearer <token>` header. The
        token's `sub` claim is mapped to a Pramana `user_id` at first login.

  parameters:
    Page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
    PageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 200
        default: 50
    UserId:
      name: user_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CourseId:
      name: course_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: version_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    QuestionId:
      name: question_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AssignmentId:
      name: assignment_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AttemptId:
      name: attempt_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    CertificateId:
      name: certificate_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ContentRequestId:
      name: request_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    DraftId:
      name: draft_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    FrameworkSlug:
      name: framework
      in: path
      required: true
      schema:
        type: string
        example: fcpa

  responses:
    Unauthorized:
      description: Missing or invalid credentials
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Forbidden:
      description: Authenticated but not authorised
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    NotFound:
      description: Resource does not exist
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    Conflict:
      description: Uniqueness or state conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorResponse"
    ValidationError:
      description: Input failed validation
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ValidationErrorResponse"

  schemas:
    # ----- Common ------------------------------------------------------
    HealthStatus:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok, degraded, error]
        version:
          type: string
          example: 0.1.0
        checks:
          type: object
          additionalProperties:
            type: string

    ErrorResponse:
      type: object
      required: [code, message]
      properties:
        code:
          type: string
          description: Stable machine-readable error code
          example: cooldown_active
        message:
          type: string
          example: Cooldown is active until 2027-01-15.
        context:
          type: object
          additionalProperties: true

    ValidationErrorResponse:
      allOf:
        - $ref: "#/components/schemas/ErrorResponse"
        - type: object
          properties:
            errors:
              type: array
              items:
                type: object
                required: [field, message]
                properties:
                  field:
                    type: string
                  message:
                    type: string

    Pagination:
      type: object
      required: [page, page_size, total]
      properties:
        page:
          type: integer
        page_size:
          type: integer
        total:
          type: integer

    BulkImportSummary:
      type: object
      required: [total_rows, created, skipped, errors]
      properties:
        total_rows:
          type: integer
        created:
          type: integer
        updated:
          type: integer
        skipped:
          type: integer
        errors:
          type: array
          items:
            type: object
            required: [row, message]
            properties:
              row:
                type: integer
              message:
                type: string

    # ----- Enums -------------------------------------------------------
    UserStatus:
      type: string
      enum: [active, inactive, on_leave]
    UserType:
      type: string
      enum: [employee, contractor]
    RoleName:
      type: string
      enum:
        [trainee, manager, content_author, compliance_admin, auditor]
    QuestionType:
      type: string
      enum: [single_select, true_false]
      description: |
        v1 supports single-select multiple choice and true/false. Multi-select
        and free-text are deferred to v2.
    AssignmentStatus:
      type: string
      enum:
        [assigned, in_progress, passed, blocked, cancelled, expired]
    AttemptOutcome:
      type: string
      enum: [pass, fail, in_progress]
    AssignmentTerminalReason:
      type: string
      enum: [passed, max_attempts_failed, cancelled_by_admin, expired_due_date]

    # ----- User --------------------------------------------------------
    User:
      type: object
      required:
        [
          user_id,
          email,
          first_name,
          last_name,
          user_type,
          status,
          pseudonymized,
          created_at,
        ]
      properties:
        user_id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        first_name:
          type: string
        last_name:
          type: string
        user_type:
          $ref: "#/components/schemas/UserType"
        department:
          type: string
          nullable: true
        manager_user_id:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/UserStatus"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleName"
        pseudonymized:
          type: boolean
          description: True when PII has been replaced under GDPR-style erasure
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    UserCreate:
      type: object
      required: [email, first_name, last_name, user_type]
      properties:
        email:
          type: string
          format: email
        first_name:
          type: string
          minLength: 1
          maxLength: 100
        last_name:
          type: string
          minLength: 1
          maxLength: 100
        user_type:
          $ref: "#/components/schemas/UserType"
        department:
          type: string
        manager_email:
          type: string
          format: email
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleName"

    UserUpdate:
      type: object
      properties:
        first_name:
          type: string
        last_name:
          type: string
        department:
          type: string
        manager_user_id:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/UserStatus"
        roles:
          type: array
          items:
            $ref: "#/components/schemas/RoleName"

    PseudonymizeRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 10
          description: Audit-log reason for the irreversible pseudonymization

    UserPage:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ----- Course ------------------------------------------------------
    Course:
      type: object
      required:
        [
          course_id,
          title,
          cooldown_days,
          pass_threshold_pct,
          framework_tags,
          created_at,
          archived,
        ]
      properties:
        course_id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        current_version_id:
          type: string
          format: uuid
          nullable: true
        cooldown_days:
          type: integer
          minimum: 0
        pass_threshold_pct:
          type: integer
          minimum: 0
          maximum: 100
        framework_tags:
          type: array
          items:
            type: string
          example: [sox]
        topic_tags:
          type: array
          items:
            type: string
          example: [sox.ethics, sox.fcpa]
        created_at:
          type: string
          format: date-time
        archived:
          type: boolean
        archived_at:
          type: string
          format: date-time
          nullable: true

    CourseCreate:
      type: object
      required: [title]
      properties:
        title:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        cooldown_days:
          type: integer
          minimum: 0
          default: 365
        pass_threshold_pct:
          type: integer
          minimum: 0
          maximum: 100
          default: 80
        framework_tags:
          type: array
          items:
            type: string
        topic_tags:
          type: array
          items:
            type: string

    CourseUpdate:
      type: object
      properties:
        title:
          type: string
        description:
          type: string
        cooldown_days:
          type: integer
          minimum: 0
        pass_threshold_pct:
          type: integer
          minimum: 0
          maximum: 100
        framework_tags:
          type: array
          items:
            type: string
        topic_tags:
          type: array
          items:
            type: string

    CoursePage:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Course"
        pagination:
          $ref: "#/components/schemas/Pagination"

    CourseVersion:
      type: object
      required:
        [
          version_id,
          course_id,
          version_number,
          published_at,
          is_active,
        ]
      properties:
        version_id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        version_number:
          type: integer
          minimum: 1
        published_at:
          type: string
          format: date-time
        published_by_user_id:
          type: string
          format: uuid
        video_asset_id:
          type: string
        min_watch_pct:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
        is_active:
          type: boolean
        is_material_change:
          type: boolean
          default: false

    CourseVersionCreate:
      type: object
      properties:
        video_asset_id:
          type: string
          description: S3 key of the uploaded video asset
        min_watch_pct:
          type: integer
          minimum: 0
          maximum: 100
          default: 0
        is_material_change:
          type: boolean
          default: false

    # ----- Question ----------------------------------------------------
    Question:
      type: object
      required:
        [
          question_id,
          course_version_id,
          question_text,
          question_type,
          weight,
          options,
        ]
      properties:
        question_id:
          type: string
          format: uuid
        course_version_id:
          type: string
          format: uuid
        question_text:
          type: string
        question_type:
          $ref: "#/components/schemas/QuestionType"
        weight:
          type: number
          minimum: 0.1
          default: 1.0
        version_number:
          type: integer
          minimum: 1
        options:
          type: array
          items:
            $ref: "#/components/schemas/AnswerOption"

    AnswerOption:
      type: object
      required: [option_id, option_text, display_order]
      properties:
        option_id:
          type: string
          format: uuid
        option_text:
          type: string
        is_correct:
          type: boolean
          description: Returned only to authors and auditors. Hidden from trainees pre-submission.
        display_order:
          type: integer

    QuestionCreate:
      type: object
      required: [question_text, question_type, options]
      properties:
        question_text:
          type: string
          minLength: 1
        question_type:
          $ref: "#/components/schemas/QuestionType"
        weight:
          type: number
          default: 1.0
        options:
          type: array
          minItems: 2
          items:
            type: object
            required: [option_text, is_correct, display_order]
            properties:
              option_text:
                type: string
              is_correct:
                type: boolean
              display_order:
                type: integer

    QuestionUpdate:
      type: object
      properties:
        question_text:
          type: string
        weight:
          type: number
        options:
          type: array
          items:
            type: object
            properties:
              option_text:
                type: string
              is_correct:
                type: boolean
              display_order:
                type: integer

    # ----- Assignment --------------------------------------------------
    Assignment:
      type: object
      required:
        [
          assignment_id,
          user_id,
          course_id,
          course_version_id,
          status,
          assigned_at,
          attempts_used,
        ]
      properties:
        assignment_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        course_version_id:
          type: string
          format: uuid
          description: Snapshotted at assignment creation
        assigned_at:
          type: string
          format: date-time
        assigned_by_user_id:
          type: string
          format: uuid
        due_at:
          type: string
          format: date-time
          nullable: true
        status:
          $ref: "#/components/schemas/AssignmentStatus"
        attempts_used:
          type: integer
          minimum: 0
        terminal_at:
          type: string
          format: date-time
          nullable: true
        terminal_reason:
          $ref: "#/components/schemas/AssignmentTerminalReason"
        cooldown_until:
          type: string
          format: date-time
          nullable: true

    AssignmentCreate:
      type: object
      required: [user_id, course_id]
      properties:
        user_id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        due_at:
          type: string
          format: date-time

    CancelRequest:
      type: object
      required: [reason]
      properties:
        reason:
          type: string
          minLength: 10

    AssignmentPage:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Assignment"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ----- Attempt -----------------------------------------------------
    Attempt:
      type: object
      required:
        [
          attempt_id,
          assignment_id,
          attempt_number,
          started_at,
          outcome,
        ]
      properties:
        attempt_id:
          type: string
          format: uuid
        assignment_id:
          type: string
          format: uuid
        attempt_number:
          type: integer
          minimum: 1
        started_at:
          type: string
          format: date-time
        submitted_at:
          type: string
          format: date-time
          nullable: true
        score_pct:
          type: number
          nullable: true
        outcome:
          $ref: "#/components/schemas/AttemptOutcome"
        total_active_seconds:
          type: integer
          nullable: true

    AttemptDetail:
      allOf:
        - $ref: "#/components/schemas/Attempt"
        - type: object
          properties:
            questions:
              type: array
              items:
                $ref: "#/components/schemas/AttemptQuestion"

    AttemptQuestion:
      type: object
      required: [question_id, question_text, question_type, options]
      properties:
        question_id:
          type: string
          format: uuid
        question_text:
          type: string
        question_type:
          $ref: "#/components/schemas/QuestionType"
        options:
          type: array
          items:
            $ref: "#/components/schemas/AnswerOption"
        selected_option_ids:
          type: array
          items:
            type: string
            format: uuid
        is_correct:
          type: boolean
          nullable: true
          description: Only populated after attempt submission

    AnswerUpsert:
      type: object
      required: [question_id, selected_option_ids]
      properties:
        question_id:
          type: string
          format: uuid
        selected_option_ids:
          type: array
          items:
            type: string
            format: uuid
        time_spent_seconds:
          type: integer
          minimum: 0

    AttemptSubmit:
      type: object
      required: [attestation_accepted]
      properties:
        attestation_accepted:
          type: boolean
          description: Must be true. Records the SOX user attestation.
        client_total_active_seconds:
          type: integer
          description: Client-reported active time; server validates against question timestamps

    AttemptSubmissionResult:
      type: object
      required:
        [
          attempt_id,
          score_pct,
          outcome,
          assignment_status,
          retry_available,
        ]
      properties:
        attempt_id:
          type: string
          format: uuid
        score_pct:
          type: number
        outcome:
          $ref: "#/components/schemas/AttemptOutcome"
        assignment_status:
          $ref: "#/components/schemas/AssignmentStatus"
        retry_available:
          type: boolean
        retry_question_count:
          type: integer
          description: If retry_available, the number of questions in the next attempt
        certificate_id:
          type: string
          format: uuid
          nullable: true

    # ----- Certificate -------------------------------------------------
    Certificate:
      type: object
      required:
        [
          certificate_id,
          user_id,
          course_id,
          course_version_id,
          issued_at,
          expires_at,
          verification_code,
        ]
      properties:
        certificate_id:
          type: string
          format: uuid
        user_id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        course_version_id:
          type: string
          format: uuid
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        verification_code:
          type: string
        attestation_text_version:
          type: string
        attestation_ip:
          type: string
        attestation_timestamp:
          type: string
          format: date-time

    CertificateVerification:
      type: object
      required: [valid, issued_at, course_title]
      properties:
        valid:
          type: boolean
        issued_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        course_title:
          type: string
        recipient_display_name:
          type: string
          description: Pseudonymized to first name + last initial for privacy

    CertificatePage:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Certificate"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ----- Audit -------------------------------------------------------
    AuditLogEntry:
      type: object
      required: [audit_id, entity_type, event_type, occurred_at]
      properties:
        audit_id:
          type: integer
          format: int64
        actor_user_id:
          type: string
          format: uuid
          nullable: true
        entity_type:
          type: string
          example: assignment
        entity_id:
          type: string
        event_type:
          type: string
          example: assignment.passed
        payload:
          type: object
          additionalProperties: true
        occurred_at:
          type: string
          format: date-time
        prev_audit_hash:
          type: string
          nullable: true

    AuditLogPage:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditLogEntry"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ----- Frameworks (definitions library) ----------------------------
    Framework:
      type: object
      required: [code, name]
      properties:
        code:
          type: string
          example: fcpa
        name:
          type: string
          example: Foreign Corrupt Practices Act
        status:
          type: string
          example: candidate
        doc:
          type: string
          example: docs/frameworks/framework_fcpa.md

    FrameworkClause:
      type: object
      required: [clause, ref]
      properties:
        clause:
          type: string
          example: anti-bribery
        title:
          type: string
          example: Anti-bribery
        ref:
          type: string
          description: Stable anchor in the framework doc; cited by source_definitions.
          example: docs/frameworks/framework_fcpa.md#anti-bribery

    # ----- Content Requests (Package Request → Mentible) ----------------
    SourceDefinition:
      type: object
      required: [framework, clause]
      properties:
        framework:
          type: string
          example: fcpa
        clause:
          type: string
          example: anti-bribery
        ref:
          type: string
          example: docs/frameworks/framework_fcpa.md#anti-bribery

    RequestScope:
      type: object
      properties:
        personas:
          type: array
          items:
            type: string
          example: [employee]
        risk_tier:
          type: string
          enum: [low, medium, high]
        industries:
          type: array
          items:
            type: string

    Assessment:
      type: object
      required: [pass_threshold_pct]
      properties:
        required:
          type: boolean
          default: true
        pass_threshold_pct:
          type: integer
          minimum: 0
          maximum: 100
          default: 80
        min_questions:
          type: integer
          minimum: 1
        style:
          type: string
          enum: [scenario-based, recall]
          default: scenario-based

    RequestConstraints:
      type: object
      properties:
        every_claim_cited:
          type: boolean
          default: true
        length_minutes:
          type: integer
          minimum: 1
        reading_level:
          type: string
        language:
          type: string
          default: en

    ContentRequestStatus:
      type: string
      enum: [requested, generating, received, in_review, published, failed]

    ContentRequestCreate:
      type: object
      required: [framework, title, source_definitions, assessment]
      properties:
        framework:
          type: string
          example: fcpa
        title:
          type: string
        course_id:
          type: string
          format: uuid
          nullable: true
          description: Target course lineage; omit to create a new course.
        scope:
          $ref: "#/components/schemas/RequestScope"
        source_definitions:
          type: array
          minItems: 1
          items:
            $ref: "#/components/schemas/SourceDefinition"
        learning_objectives:
          type: array
          items:
            type: string
        assessment:
          $ref: "#/components/schemas/Assessment"
        constraints:
          $ref: "#/components/schemas/RequestConstraints"
        deliverables:
          type: array
          items:
            type: string
            enum: [epub3, pdf, mp4]
        visuals:
          type: array
          items:
            type: string
            enum: [animated_svg]
        satisfies_stories:
          type: array
          items:
            type: string
            example: US-FCPA-0001

    ContentRequest:
      type: object
      required: [request_id, framework, title, status, requested_by, created_at]
      properties:
        request_id:
          type: string
          format: uuid
        framework:
          type: string
        title:
          type: string
        status:
          $ref: "#/components/schemas/ContentRequestStatus"
        requested_by:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
        package_id:
          type: string
          format: uuid
          nullable: true
          description: Set once Mentible returns a package.
        draft_id:
          type: string
          format: uuid
          nullable: true
          description: The ContentDraft created on ingestion.
        satisfies_stories:
          type: array
          items:
            type: string

    ContentRequestPage:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ContentRequest"
        pagination:
          $ref: "#/components/schemas/Pagination"

    # ----- Consumable Package (inbound from Mentible, ADR-011 §4) -------
    Provenance:
      type: object
      required: [engine, model, provider, prompt_version, generated_at]
      properties:
        engine:
          type: string
          example: mentible
        model:
          type: string
          example: claude-sonnet-4-6
        provider:
          type: string
          example: anthropic
        prompt_version:
          type: string
          example: psai-2026-06
        generated_at:
          type: string
          format: date-time

    ConsumablePackageManifest:
      type: object
      description: The Mentible Consumable Package manifest (ADR-011 §4).
      required:
        [
          package_id,
          package_version,
          title,
          frameworks,
          source_definitions,
          provenance,
          content_hash,
          modules,
          quiz,
          signature,
        ]
      properties:
        package_id:
          type: string
          format: uuid
        package_version:
          type: integer
          minimum: 1
        title:
          type: string
        frameworks:
          type: array
          items:
            type: string
        source_definitions:
          type: array
          items:
            $ref: "#/components/schemas/SourceDefinition"
        provenance:
          $ref: "#/components/schemas/Provenance"
        content_hash:
          type: string
          example: "sha256:e3b0c44298fc1c149afbf4c8996fb924..."
        modules:
          type: array
          items:
            type: object
            additionalProperties: true
        quiz:
          type: object
          additionalProperties: true
        assets:
          type: array
          items:
            type: object
            additionalProperties: true
        artifacts:
          type: array
          items:
            type: object
            additionalProperties: true
        signature:
          type: string

    IngestPackageRequest:
      type: object
      required: [tenant_id, course_id, manifest]
      properties:
        tenant_id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
        manifest:
          $ref: "#/components/schemas/ConsumablePackageManifest"

    IngestPackageResult:
      type: object
      required: [draft_id, status, package_id, package_version]
      properties:
        draft_id:
          type: string
          format: uuid
        status:
          $ref: "#/components/schemas/ContentDraftStatus"
        package_id:
          type: string
          format: uuid
        package_version:
          type: integer

    # ----- Content Drafts (the approval gate) --------------------------
    ContentDraftStatus:
      type: string
      enum: [received, draft, in_review, approved, published, rejected]

    VerificationResult:
      type: object
      required: [signature_ok, content_hash_ok]
      properties:
        signature_ok:
          type: boolean
        content_hash_ok:
          type: boolean
        quarantined:
          type: boolean
          description: True if verification failed; the draft is not publishable.

    ContentDraft:
      type: object
      required: [draft_id, status, title, framework]
      properties:
        draft_id:
          type: string
          format: uuid
        course_id:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/ContentDraftStatus"
        title:
          type: string
        framework:
          type: string
        package_id:
          type: string
          format: uuid
          nullable: true
        package_version:
          type: integer
          nullable: true
        verified:
          type: boolean
          description: Signature + content_hash verified on ingest.
        created_at:
          type: string
          format: date-time

    ContentDraftDetail:
      allOf:
        - $ref: "#/components/schemas/ContentDraft"
        - type: object
          properties:
            provenance:
              $ref: "#/components/schemas/Provenance"
            source_definitions:
              type: array
              items:
                $ref: "#/components/schemas/SourceDefinition"
            modules:
              type: array
              items:
                type: object
                additionalProperties: true
            quiz:
              type: object
              additionalProperties: true
            artifacts:
              type: array
              items:
                type: object
                additionalProperties: true
            assets:
              type: array
              items:
                type: object
                additionalProperties: true
            verification:
              $ref: "#/components/schemas/VerificationResult"
            review_notes:
              type: string
              nullable: true

    ContentDraftPage:
      type: object
      required: [items, pagination]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ContentDraft"
        pagination:
          $ref: "#/components/schemas/Pagination"

    ApproveRequest:
      type: object
      required: [attestation_text]
      properties:
        attestation_text:
          type: string
          description: The approver's accuracy attestation, captured as audit evidence.

    ReviewNotes:
      type: object
      required: [notes]
      properties:
        notes:
          type: string

    PublishRequest:
      type: object
      properties:
        effective_from:
          type: string
          format: date-time
          nullable: true
        is_material_change:
          type: boolean
          default: false

    RegenerateRequest:
      type: object
      properties:
        notes:
          type: string
        parameter_overrides:
          type: object
          description: |
            Partial Package Request fields to change before regenerating (e.g.
            scope, assessment, constraints). Unspecified fields reuse the original.
          additionalProperties: true

    # ----- Player (playback + watch progress) --------------------------
    PlayerAsset:
      type: object
      required: [type, url]
      properties:
        id:
          type: string
        type:
          type: string
          enum: [video, deck, animated_svg, pdf]
        url:
          type: string
          format: uri
          description: Time-limited (e.g. presigned) asset URL.
        expires_at:
          type: string
          format: date-time

    PlayerManifest:
      type: object
      required:
        [
          assignment_id,
          course_version_id,
          min_watch_pct,
          watched_pct,
          quiz_unlocked,
          assets,
        ]
      properties:
        assignment_id:
          type: string
          format: uuid
        course_version_id:
          type: string
          format: uuid
        title:
          type: string
        min_watch_pct:
          type: integer
          minimum: 0
          maximum: 100
        watched_pct:
          type: integer
          minimum: 0
          maximum: 100
        quiz_unlocked:
          type: boolean
        assets:
          type: array
          items:
            $ref: "#/components/schemas/PlayerAsset"

    ProgressUpdate:
      type: object
      required: [watched_pct]
      properties:
        watched_pct:
          type: integer
          minimum: 0
          maximum: 100
        position_seconds:
          type: number
          nullable: true

    WatchProgress:
      type: object
      required: [assignment_id, watched_pct, quiz_unlocked]
      properties:
        assignment_id:
          type: string
          format: uuid
        watched_pct:
          type: integer
          minimum: 0
          maximum: 100
        quiz_unlocked:
          type: boolean
        updated_at:
          type: string
          format: date-time
